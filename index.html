<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢GAMEs & 三鷹の街</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基本設定 --- */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f7f6f0;
            color: #3a352a;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* --- タイトル部分（三鷹デザイン） --- */
        .mitaka-game-title {
            font-family: 'Kiwi Maru', serif;
            font-size: 1.8rem;
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(135deg, #1b3d31 0%, #3d7054 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 3px 0px #bfa17a);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }
        .mitaka-game-title::before {
            content: "🍃";
            font-size: 1.5rem;
            margin-right: 0.5rem;
            -webkit-text-fill-color: initial;
        }

        /* --- コンテナと余白 --- */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- ボタン共通スタイル --- */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        
        .btn-shiny, .press-btn {
            display: block;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-shiny {
            background: #fff;
            border: 2px solid #3d7054;
            color: #3d7054;
        }

        .press-btn {
            background: linear-gradient(135deg, #d35400, #e67e22);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3);
        }

        /* --- セクション画像部分 --- */
        section {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            border-radius: 12px;
            margin-bottom: 15px;
            background-color: #333; /* 画像がない場合のプレースホルダー色 */
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .overlay-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
        }

        /* --- 多言語対応メッセージ --- */
        .lang-box {
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ヘッダー -->
        <div class="hero">
            <h2>ようこそ夢GAMEsへ</h2>
        </div>

        <h1 class="mitaka-game-title">あなたのまちのゲーム屋さん</h1>

        <!-- ボタンエリア -->
        <div class="btn-wrapper">
            <a href="https://yasushikomine6-cell.github.io/drames_02.html" class="btn-shiny">創設者プロフィールへ進む ➔</a>
            <a href="https://yasushikomine6-cell.github.io/yui_cyan.html" class="btn-shiny">ゆいちゃんの公式ページ ➔</a>
            <a href="https://yasushikomine6-cell.github.io/employee.html" target="_blank" class="press-btn">🔥 デジタルプレス室 優秀従業員名簿</a>
        </div>

        <!-- ギャラリー -->
        <section class="section-market">
            <div class="overlay-box">
                <h3>音楽院の街角にて</h3>
                <p>素敵な音楽が聴こえてきそうじゃろ？</p>
            </div>
        </section>

        <section class="section-piano">
            <div class="overlay-box">
                <h3>運命のコンサート</h3>
                <p>ドキドキをエネルギーに変えるんよ！</p>
            </div>
        </section>

        <section class="section-taxi-stage">
            <div class="overlay-box">
                <h3>緊迫のラストステージ</h3>
                <p>今度は、私の番...！</p>
            </div>
        </section>

        <!-- 言語情報 -->
        <div style="border: 1px solid #1f883d; background-color: #dafbe1; color: #1a7f37;" class="lang-box">
            当社は、令和という時代に合わせ、完全ペーパーレス化を行っています。
        </div>
        <div style="border: 1px solid #0969da; background-color: #ddf4ff; color: #0969da; margin-top: 10px;" class="lang-box">
            당사는 레이와(令和) 시대에 발맞추어 완전한 페이퍼리스(무지화)를 실천하고 있습니다.
        </div>
    </div>

</body>
</html>
